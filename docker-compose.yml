services:
  postgres:
    image: postgres:16
    container_name: animal-app-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: animal_app
    ports:
      - "5432:5432"
    volumes:
      - animal_app_postgres:/var/lib/postgresql/data

volumes:
  animal_app_postgres:
